apiVersion: apps/v1
kind: Deployment
metadata:
  name: multistrategy-portfolio
  namespace: trading
spec:
  replicas: 0              # Starts at 0 — CronJob scales to 1 at market open
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: multistrategy
  template:
    metadata:
      labels:
        app: multistrategy
    spec:
      nodeSelector:
        trading-node: worker    # Only schedule on the VX1 worker node
      containers:
        # Portfolio API — manages state, executes orders via IBKR
        - name: multistrategy-api
          image: sureshotcapital/multi-strategy-api:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: DATABASE_URL
              value: "postgresql://postgres:postgres@postgres:5432/multistrategy"
            - name: TRADING_MODE
              value: "LIVE"
            - name: IBKR_GATEWAY_URL
              value: "https://ib-gateway-service:5000/v1/api"
            - name: IBKR_GATEWAY_HTTP_URL
              value: "https://ib-gateway-service:5000"
            - name: IBKR_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ib-credentials
                  key: username
            - name: IBKR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ib-credentials
                  key: password
            - name: IBKR_SECRET
              valueFrom:
                secretKeyRef:
                  name: ib-credentials
                  key: otp_secret
            - name: IBKR_ACCT_NUMBER
              valueFrom:
                secretKeyRef:
                  name: ib-credentials
                  key: account_number
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5

        # ORB Aziz TQQQ strategy — submits orders to multistrategy-api via localhost
        - name: orb-aziz-tqqq
          image: sureshotcapital/orb-aziz-tqqq:latest
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          env:
            - name: TRADING_MODE
              value: "LIVE"
            - name: API_URL
              value: "http://localhost:8000"
            - name: POLYGON_API_KEY
              valueFrom:
                secretKeyRef:
                  name: polygon-credentials
                  key: api_key

        # PostgreSQL — portfolio state persistence
        - name: postgres
          image: postgres:14-alpine
          ports:
            - containerPort: 5432
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: "postgres"
            - name: POSTGRES_DB
              value: "multistrategy"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: multistrategy-postgres-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: multistrategy-postgres-pvc
  namespace: trading
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: microk8s-hostpath
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: trading
spec:
  selector:
    app: multistrategy
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: multistrategy-api
  namespace: trading
spec:
  selector:
    app: multistrategy
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
