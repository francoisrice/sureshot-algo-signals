apiVersion: apps/v1
kind: Deployment
metadata:
  name: multistrategy-portfolio
  namespace: trading
spec:
  replicas: 0              # Starts at 0 — CronJob scales to 1 at market open
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: multistrategy
  template:
    metadata:
      labels:
        app: multistrategy
    spec:
      nodeSelector:
        trading-node: worker    # Only schedule on the VX1 worker node
      containers:
        # Portfolio API — manages state, executes orders via IBKR
        - name: multistrategy-api
          image: sureshotcapital/multi-strategy-api:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: DATABASE_URL
              value: "postgresql://postgres:postgres@postgres:5432/multistrategy"
            - name: TRADING_MODE
              value: "LIVE"
            - name: IBKR_GATEWAY_URL
              value: "https://ib-gateway-service:5000/v1/api"
            - name: IBKR_GATEWAY_HTTP_URL
              value: "https://ib-gateway-service:5000"
            # Comma-separated strategy names — must match each strategy's STRATEGY_NAME constant
            - name: PORTFOLIO_STRATEGIES
              value: "ORB_Aziz_TQQQ"
            - name: IBKR_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ib-credentials
                  key: username
            - name: IBKR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ib-credentials
                  key: password
            - name: IBKR_SECRET
              valueFrom:
                secretKeyRef:
                  name: ib-credentials
                  key: otp_secret
            - name: IBKR_ACCT_NUMBER
              valueFrom:
                secretKeyRef:
                  name: ib-credentials
                  key: account_number
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5

        # DataFetcher service — shared Stagehand session pool for real-time price scraping
        # Reuses the multi-strategy-api image (already has stagehand + SureshotSDK installed)
        - name: data-fetcher
          image: sureshotcapital/multi-strategy-api:latest
          command: ["uvicorn", "SureshotSDK.DataFetcher.service:app", "--host", "0.0.0.0", "--port", "3100"]
          ports:
            - containerPort: 3100
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "300m"
              memory: "512Mi"
          env:
            - name: DATAFETCHER_POOL_SIZE
              value: "3"
            - name: BROWSERBASE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: browserbase-credentials
                  key: api_key
            - name: BROWSERBASE_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: browserbase-credentials
                  key: project_id
          readinessProbe:
            httpGet:
              path: /health
              port: 3100
            initialDelaySeconds: 30
            periodSeconds: 10

        # ORB Aziz TQQQ strategy — submits orders to multistrategy-api via localhost
        - name: orb-aziz-tqqq
          image: sureshotcapital/orb-aziz-tqqq:latest
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          env:
            - name: TRADING_MODE
              value: "LIVE"
            - name: API_URL
              value: "http://localhost:8000"
            - name: DATA_FETCHER_URL
              value: "http://localhost:3100"

---
apiVersion: v1
kind: Service
metadata:
  name: multistrategy-api
  namespace: trading
spec:
  selector:
    app: multistrategy
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
