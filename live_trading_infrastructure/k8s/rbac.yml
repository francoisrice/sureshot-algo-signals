# k8s/rbac.yml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: trading-scaler
  namespace: trading
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: deployment-scaler
  namespace: trading
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: trading-scaler-binding
  namespace: trading
subjects:
- kind: ServiceAccount
  name: trading-scaler
roleBinding:
  kind: Role
  name: deployment-scaler
  apiGroup: rbac.authorization.k8s.io