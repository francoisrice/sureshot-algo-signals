apiVersion: batch/v1
kind: CronJob
metadata:
  name: market-open
  namespace: trading
spec:
  schedule: "30 9 * * 1-5"    # 9:30am ET Mon-Fri
  timeZone: "America/New_York"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          nodeSelector:
            kubernetes.io/hostname: orchestrator
          serviceAccountName: trading-scaler
          containers:
          - name: scaler
            image: bitnami/kubectl:latest
            command:
            - kubectl
            - scale
            - deployment/multistrategy-portfolio
            - --replicas=1
            - -n
            - trading
          restartPolicy: OnFailure
